name: Scrape Jobs

on:
  schedule:
    # Runs every day at 07:00 UTC (08:00 Irish time / BST)
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Source to scrape"
        required: false
        default: "all"
        type: choice
        options: [all, indeed, linkedin]

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright system dependencies (Ubuntu 24.04 fix)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 libasound2t64

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run scraper — Indeed
        if: ${{ github.event.inputs.source == 'indeed' || github.event.inputs.source == 'all' || github.event_name == 'schedule' }}
        env:
          NEON_DATABASE_URL:  ${{ secrets.NEON_DATABASE_URL }}
          LINKEDIN_EMAIL:     ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD:  ${{ secrets.LINKEDIN_PASSWORD }}
          SEARCH_KEYWORDS:    "DevOps Engineer,Cloud Engineer,SRE,Platform Engineer,MLOps Engineer"
          SEARCH_LOCATION:    "Dublin, Ireland"
          MAX_PAGES_PER_SOURCE: "5"
          SCRAPE_DELAY:       "3"
        run: python -m scraper.run --source indeed

      - name: Run scraper — LinkedIn
        if: ${{ github.event.inputs.source == 'linkedin' || github.event.inputs.source == 'all' || github.event_name == 'schedule' }}
        env:
          NEON_DATABASE_URL:  ${{ secrets.NEON_DATABASE_URL }}
          LINKEDIN_EMAIL:     ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD:  ${{ secrets.LINKEDIN_PASSWORD }}
          SEARCH_KEYWORDS:    "DevOps Engineer,Cloud Engineer,SRE,Platform Engineer,MLOps Engineer"
          SEARCH_LOCATION:    "Dublin, Ireland"
          MAX_PAGES_PER_SOURCE: "5"
          SCRAPE_DELAY:       "3"
        run: python -m scraper.run --source linkedin

      - name: Upload scrape logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-logs-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
